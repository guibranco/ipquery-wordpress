name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Determine the next semantic version from git history + tags.
  # Skip entirely if this push is already a version-bump commit.
  # ---------------------------------------------------------------------------
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Calculate version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Check whether release tag already exists
        id: check_tag
        run: |
          VERSION="${{ steps.gitversion.outputs.semVer }}"
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "exists=true"  >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # PHP syntax check + PHPCS + PHPUnit (skipped if tag already exists)
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    needs: version
    if: needs.version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dev dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP Syntax
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./includes/vendor/*" \
            | xargs -P4 -I{} php -l {}

      - name: PHPCS
        run: vendor/bin/phpcs

      - name: PHPUnit
        run: vendor/bin/phpunit

  # ---------------------------------------------------------------------------
  # WordPress Plugin Check (skipped if tag already exists)
  # ---------------------------------------------------------------------------
  plugin-check:
    name: WP Plugin Check
    needs: version
    if: needs.version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wp-version: 'latest'

  # ---------------------------------------------------------------------------
  # Bump version files, tag, build release zip, publish GitHub Release
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: [version, test, plugin-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use a PAT with workflow scope so the version-bump push can be made.
          # Falls back gracefully to GITHUB_TOKEN (push will be silent to CI).
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in plugin files
        env:
          VERSION: ${{ needs.version.outputs.semVer }}
        run: |
          sed -i "s/^ \* Version:.*/ * Version:           ${VERSION}/" ipquery.php
          sed -i "s/define( 'IPQUERY_VERSION',[^)]*)/define( 'IPQUERY_VERSION', '${VERSION}' )/" ipquery.php
          sed -i "s/^Stable tag:.*/Stable tag: ${VERSION}/" readme.txt

      - name: Commit version bump and create tag
        env:
          VERSION: ${{ needs.version.outputs.semVer }}
        run: |
          git add ipquery.php readme.txt
          # Only commit if something actually changed.
          git diff --cached --quiet \
            || git commit -m "chore: bump version to ${VERSION}"
          git tag "v${VERSION}"
          git push origin main "v${VERSION}"

      - name: Build release zip
        env:
          VERSION: ${{ needs.version.outputs.semVer }}
        run: |
          mkdir -p /tmp/ipquery
          rsync -a \
            --exclude='.git'           \
            --exclude='.github'        \
            --exclude='.gitignore'     \
            --exclude='docs'           \
            --exclude='tests'          \
            --exclude='vendor'         \
            --exclude='composer.json'  \
            --exclude='composer.lock'  \
            --exclude='phpunit.xml'    \
            --exclude='phpcs.xml'      \
            --exclude='GitVersion.yml' \
            --exclude='README.md'      \
            ./ /tmp/ipquery/
          cd /tmp
          zip -r "ipquery-${VERSION}.zip" ipquery/
          echo "ZIP=/tmp/ipquery-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.semVer }}
          name: IpQuery v${{ needs.version.outputs.semVer }}
          generate_release_notes: true
          files: ${{ env.ZIP }}
