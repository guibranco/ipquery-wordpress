name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Determine the next semantic version from git history + tags.
  # ---------------------------------------------------------------------------
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.5.0
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.5.0

  # ---------------------------------------------------------------------------
  # PHP syntax check + PHPCS + PHPUnit
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dev dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP Syntax
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./includes/vendor/*" \
            | xargs -P4 -I{} php -l {}

      - name: PHPCS
        run: vendor/bin/phpcs

      - name: PHPUnit
        run: vendor/bin/phpunit

  # ---------------------------------------------------------------------------
  # WordPress Plugin Check
  # ---------------------------------------------------------------------------
  plugin-check:
    name: WP Plugin Check
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stage plugin under its slug directory
        env:
          VERSION: ${{ needs.version.outputs.fullSemVer }}
        run: |
          mkdir -p /tmp/ipquery
          git archive HEAD --format=zip --prefix=ipquery/ --output="/tmp/ipquery-${VERSION}.zip"

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wp-version: 'latest'
          build-dir: /tmp/ipquery

  # ---------------------------------------------------------------------------
  # Bump version files, tag, build release zip, publish GitHub Release.
  # The version-bump commit includes [skip ci] so this workflow is not
  # re-triggered by the bot's own push back to main.
  # ---------------------------------------------------------------------------
  release:
    name: Release
    needs: [version, test, plugin-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use a PAT with workflow scope so the version-bump push can be made.
          # Falls back gracefully to GITHUB_TOKEN (push will be silent to CI).
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in plugin files
        env:
          VERSION: ${{ needs.version.outputs.fullSemVer }}
        run: |
          sed -i "s/^ \* Version:.*/ * Version:           ${VERSION}/" ipquery.php
          sed -i "s/define( 'IPQUERY_VERSION',[^)]*)/define( 'IPQUERY_VERSION', '${VERSION}' )/" ipquery.php
          sed -i "s/^Stable tag:.*/Stable tag: ${VERSION}/" readme.txt

      - name: Commit version bump, tag, and push
        env:
          VERSION: ${{ needs.version.outputs.fullSemVer }}
        run: |
          git add ipquery.php readme.txt
          # Commit only when the version files actually changed.
          git diff --cached --quiet \
            || git commit -m "chore: bump version to ${VERSION} [skip ci]"

          # Create and push the tag only if it does not already exist remotely.
          if git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            echo "Tag v${VERSION} already exists — pushing commits only."
            git push origin main
          else
            git tag "v${VERSION}"
            git push origin main "v${VERSION}"
          fi

      - name: Build release zip
        env:
          VERSION: ${{ needs.version.outputs.fullSemVer }}
        run: |
          git archive HEAD --format=zip --prefix=ipquery/ --output="/tmp/ipquery-${VERSION}.zip"
          echo "ZIP=/tmp/ipquery-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.fullSemVer }}
          name: IpQuery v${{ needs.version.outputs.fullSemVer }}
          generate_release_notes: true
          files: ${{ env.ZIP }}
