name: Tests

on:
  pull_request:
    branches: [main]

concurrency:
  group: test-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: PHP Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Check syntax on all plugin PHP files
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./includes/vendor/*" \
            | xargs -P4 -I{} php -l {}

  phpcs:
    name: PHPCS (WordPress Coding Standards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install dev dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPCS
        run: vendor/bin/phpcs

  phpunit:
    name: PHPUnit (Unit Tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: xdebug

      - name: Install dev dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run unit tests
        run: vendor/bin/phpunit --coverage-text

  plugin-check:
    name: WP Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Stage plugin under its slug directory
        run: |
          mkdir -p /tmp/ipquery
          rsync -a \
            --exclude='.git'           \
            --exclude='.github'        \
            --exclude='.gitignore'     \
            --exclude='.wp-env.json'   \
            --exclude='docs'           \
            --exclude='tests'          \
            --exclude='/vendor'        \
            --exclude='composer.json'  \
            --exclude='composer.lock'  \
            --exclude='phpunit.xml'    \
            --exclude='phpcs.xml'      \
            --exclude='GitVersion.yml' \
            --exclude='README.md'      \
            ./ /tmp/ipquery/

      - name: Run WordPress Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wp-version: 'latest'
          build-dir: /tmp/ipquery
